# Nightly regeneration -- rebuild docs/samples/operator-console.html
# through the REAL actor (riceops.render-html, driving
# riceops.operation/riceops.governor/riceops.store the same way
# riceops.sim does) and commit only when the rendered console actually
# changed. Closes flagship checklist item 2 (ADR-2607189300 at
# com-junkawasaki/root, rollout wave5): docs/samples/operator-console.html
# is generated by running the actor, never a hand-typed mockup.
#
# JVM Clojure (clojure -M), matching this repo's own deps.edn aliases
# (:run/:test/:lint all use clojure -M already).
#
# Checkout layout: `riceops.operation/build` now compiles a real
# langgraph-clj StateGraph, so deps.edn's top-level :deps pins
# kotoba-lang/langgraph + kotoba-lang/langchain-store via in-monorepo
# :local/root paths (and :dev overrides langchain the same way) --
# those don't resolve on a bare single-repo checkout, so this job
# reconstructs the workspace layout by checking out all three siblings
# (all PUBLIC) into the expected relative paths, same pattern as this
# repo's own ci.yml / cloud-itonami-isic-0111's regenerate.yml.
#
# Fork note: this runs on the default GITHUB_TOKEN (contents: write).
# If your org disables Actions, run `clojure -M:dev:render-html` from
# any scheduler (see docs/operator-quickstart.md).
name: regenerate-console
on:
  schedule:
    - cron: '23 17 * * *'   # 02:23 JST nightly (off-minute on purpose; picked clear of sibling cloud-itonami-isic-* regenerate.yml cron slots at 17:xx UTC)
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: orgs/cloud-itonami/cloud-itonami-isic-0112
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langgraph
          path: orgs/kotoba-lang/langgraph
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langchain
          path: orgs/kotoba-lang/langchain
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langchain-store
          path: orgs/kotoba-lang/langchain-store
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.4
        with: { cli: latest }
      - name: regenerate through the real actor
        working-directory: orgs/cloud-itonami/cloud-itonami-isic-0112
        run: clojure -M:dev:render-html
      - name: verify (real output, not scaffolding)
        working-directory: orgs/cloud-itonami/cloud-itonami-isic-0112
        run: |
          grep -q 'riceops.render-html' docs/samples/operator-console.html
          grep -q '<tbody>' docs/samples/operator-console.html
          test "$(wc -l < docs/samples/operator-console.html)" -gt 30
          echo "operator console sanity ok"
      - name: commit when changed
        working-directory: orgs/cloud-itonami/cloud-itonami-isic-0112
        run: |
          if ! git diff --quiet docs/; then
            git config user.name "regenerate-console[bot]"
            git config user.email "noreply@github.com"
            git add docs/
            git commit -m "chore(console): nightly regeneration through the real actor"
            git push
          else
            echo "console unchanged"
          fi
